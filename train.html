<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HM&amp;GT — Тренажёр</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HM&amp;GT">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#F48D01">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: #F48D01; font-family: system-ui, 'Segoe UI', 'Cormorant Garamond', serif; color: #000000; line-height: 1.5; padding: 2rem 1.5rem; min-height: 100vh; position: relative; }
        .logo { margin-bottom: 15px; }
        .logo h1 { font-size: 1.8rem; color: #000000; font-weight: bold; letter-spacing: 2px; font-family: 'Courier New', 'American Typewriter', monospace; background: transparent; padding: 0; display: inline-block; }
        .bg-layers { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
        .bg-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; background-repeat: no-repeat; }
        .bg-domino { background-image: url('domino.png'); filter: grayscale(100%) brightness(196%) contrast(300%) blur(0px); opacity: 1.0; }
        .bg-graph { background-image: url('graph.png'); filter: grayscale(48%) brightness(79%) contrast(300%) blur(0px); opacity: 0.57; }
        .container { position: relative; z-index: 2; max-width: 1280px; margin: 0 auto; }
        .install-area { text-align: center; margin: 0 0 1.5rem 0; }
        .install-tooltip { position: relative; display: inline-block; }
        .pwa-icon-btn { background: none; border: none; cursor: pointer; padding: 0; display: inline-flex; flex-direction: column; align-items: center; justify-content: center; transition: transform 0.2s; gap: 0.3rem; font-size: 0.9rem; font-weight: 600; color: #000000; }
        .pwa-icon-btn img { width: 96px; height: 96px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .pwa-icon-btn:hover { transform: scale(1.05); }
        .pwa-icon-btn:active { transform: scale(0.95); }
        .tooltip-text { visibility: hidden; background-color: #333; color: #fff; text-align: center; border-radius: 6px; padding: 5px 10px; position: absolute; z-index: 1; bottom: 125%; left: 50%; transform: translateX(-50%); white-space: nowrap; opacity: 0; transition: opacity 0.3s; pointer-events: none; font-size: 0.8rem; font-weight: normal; }
        .install-tooltip:hover .tooltip-text { visibility: visible; opacity: 1; }
        .install-note { margin-top: 0.5rem; color: #000000; font-weight: 600; font-size: 0.75rem; background: rgba(255,255,255,0.3); display: inline-block; padding: 0.3rem 1rem; border-radius: 50px; }
        @media (max-width: 600px) { .pwa-icon-btn img { width: 64px; height: 64px; } .tooltip-text { white-space: normal; width: 200px; bottom: 130%; } }
        .lang-switch { display: flex; justify-content: flex-end; gap: 0.75rem; margin-bottom: 2rem; background: rgba(135, 206, 235, 0.25); backdrop-filter: blur(8px); padding: 0.75rem 1.5rem; border-radius: 60px; }
        .lang-btn { background: rgba(0,0,0,0.2); border: 1px solid rgba(0,0,0,0.3); padding: 0.4rem 1rem; border-radius: 40px; font-weight: 600; font-size: 0.9rem; cursor: pointer; color: #000000; transition: 0.2s; }
        .lang-btn.active { background: #000000; color: #b0d9b1; border-color: #000000; }
        .lang-btn:hover { background: rgba(0,0,0,0.5); color: white; }
        .hero { text-align: center; margin-bottom: 3rem; background: rgba(176, 217, 177, 0.3); backdrop-filter: blur(8px); padding: 2rem; border-radius: 3rem; }
        .hero h1 { font-size: 2.8rem; font-weight: 700; color: #000000; }
        .train-area { background: rgba(244, 141, 1, 0.85); backdrop-filter: blur(2px); border-radius: 2rem; padding: 2rem; margin: 2rem 0; color: #ffffff; }
        .question-card { background: rgba(0,0,0,0.2); border-radius: 1.5rem; padding: 1.5rem; margin-bottom: 2rem; }
        .question-card p { font-weight: bold; margin-bottom: 1rem; }
        .answers { display: flex; flex-direction: column; gap: 0.8rem; margin-bottom: 1rem; }
        .answers label { display: block; cursor: pointer; }
        .train-feedback { margin: 1rem 0; font-style: italic; }
        .next-btn, .back-btn, .home-btn { background: #000000; color: #b0d9b1; border: none; padding: 0.6rem 1.5rem; border-radius: 2rem; cursor: pointer; font-weight: bold; margin-right: 1rem; margin-bottom: 0.5rem; display: inline-block; text-decoration: none; text-align: center; }
        .result-area { background: #000000; color: #b0d9b1; padding: 1.5rem; border-radius: 1.5rem; text-align: center; font-size: 1.2rem; }
        footer { text-align: center; margin-top: 3rem; color: #000000; font-size: 0.8rem; }
        .lang-content { display: none; }
        .lang-content.active { display: block; }
        @media (max-width: 700px) { .hero h1 { font-size: 2rem; } .question-card { padding: 1rem; } }
    </style>
</head>
<body>
<div class="bg-layers">
    <div class="bg-layer bg-domino"></div>
    <div class="bg-layer bg-graph"></div>
</div>

<div class="container">
    <div class="logo"><h1>HM&amp;GT</h1></div>
    <div class="install-area">
        <div class="install-tooltip">
            <button id="pwa-install-icon" class="pwa-icon-btn">
                <img src="icon-192x192.png" alt="Установить приложение" width="96" height="96">
                <span id="pwaButtonText">Установить</span>
            </button>
            <span class="tooltip-text" id="pwaTooltip">💡 Нажмите — установите как приложение.</span>
        </div>
        <div class="install-note" id="installNote">✅ Нажмите на иконку монитора со стрелкой в адресной строке.</div>
    </div>

    <div class="lang-switch">
        <button class="lang-btn" data-lang="ru">🇷🇺 Русский</button>
        <button class="lang-btn" data-lang="en">🇬🇧 English</button>
    </div>

    <!-- Русская версия тренажёра -->
    <div id="ru-train" class="lang-content active">
        <div class="hero">
            <h1>🎮 Игровой тренажёр</h1>
            <div class="subhead">Проверьте свои знания теории игр</div>
        </div>
        <div class="train-area" id="trainAreaRu"></div>
        <div style="text-align: center; margin-top: 1rem;">
            <a href="index.html" class="home-btn">🏠 На главную</a>
        </div>
    </div>

    <!-- Английская версия тренажёра -->
    <div id="en-train" class="lang-content">
        <div class="hero">
            <h1>🎮 Game training</h1>
            <div class="subhead">Test your knowledge of game theory</div>
        </div>
        <div class="train-area" id="trainAreaEn"></div>
        <div style="text-align: center; margin-top: 1rem;">
            <a href="index.html" class="home-btn">🏠 Home</a>
        </div>
    </div>

    <footer>© Теория игр — стратегическое мышление</footer>
</div>

<script>
    const questionsRu = [
        { text: "Что такое равновесие Нэша?", options: ["Ситуация, когда каждый игрок выбирает доминирующую стратегию", "Ситуация, когда ни один игрок не может улучшить свой результат, меняя стратегию в одиночку", "Ситуация, когда игроки сотрудничают", "Ситуация, когда выигрыш одного равен проигрышу другого"], correct: 1 },
        { text: "В дилемме заключённого, какая стратегия приводит к лучшему коллективному результату?", options: ["Оба предают", "Оба молчат (сотрудничают)", "Один предаёт, другой молчит", "Случайный выбор"], correct: 1 },
        { text: "Стратегия «зуб за зуб» предполагает:", options: ["Всегда предавать", "Всегда сотрудничать", "Начинать с сотрудничества, затем копировать ход соперника", "Случайные действия"], correct: 2 }
    ];
    const questionsEn = [
        { text: "What is Nash equilibrium?", options: ["A situation where each player chooses a dominant strategy", "A situation where no player can improve their outcome by changing strategy alone", "A situation where players cooperate", "A situation where one's gain equals another's loss"], correct: 1 },
        { text: "In the prisoner's dilemma, which strategy leads to the best collective outcome?", options: ["Both betray", "Both remain silent (cooperate)", "One betrays, the other remains silent", "Random choice"], correct: 1 },
        { text: "The tit-for-tat strategy means:", options: ["Always betray", "Always cooperate", "Start cooperating, then copy opponent's last move", "Random actions"], correct: 2 }
    ];

    let currentLang = 'ru';
    let currentIndex = 0;
    let userAnswers = [];
    let currentQuestions = questionsRu;

    function renderQuestion(container, q, idx) {
        let html = `<div class="question-card">
            <p><strong>${currentLang === 'ru' ? 'Вопрос' : 'Question'} ${idx+1}:</strong> ${q.text}</p>
            <div class="answers">`;
        q.options.forEach((opt, optIdx) => {
            const checked = (userAnswers[idx] === optIdx) ? 'checked' : '';
            html += `<label><input type="radio" name="q${idx}" value="${optIdx}" ${checked}> ${opt}</label>`;
        });
        html += `</div><div class="train-feedback" id="fb-${idx}"></div>`;
        if (idx === currentQuestions.length-1) {
            html += `<button class="next-btn" id="submitBtn">${currentLang === 'ru' ? 'Завершить' : 'Finish'}</button>`;
        } else {
            html += `<button class="next-btn" id="nextBtn-${idx}">${currentLang === 'ru' ? 'Далее' : 'Next'}</button>`;
        }
        html += `<button class="back-btn" id="backBtn" style="${idx===0 ? 'display:none' : 'inline-block'}">${currentLang === 'ru' ? 'Назад' : 'Back'}</button>`;
        html += `</div>`;
        return html;
    }

    function saveCurrentAnswer() {
        const selected = document.querySelector(`input[name="q${currentIndex}"]:checked`);
        if (selected) userAnswers[currentIndex] = parseInt(selected.value);
    }

    function loadQuestion() {
        const container = currentLang === 'ru' ? document.getElementById('trainAreaRu') : document.getElementById('trainAreaEn');
        if (!container) return;
        container.innerHTML = renderQuestion(container, currentQuestions[currentIndex], currentIndex);
        const nextBtn = document.getElementById(`nextBtn-${currentIndex}`);
        if (nextBtn) nextBtn.onclick = () => { saveCurrentAnswer(); currentIndex++; loadQuestion(); };
        const submitBtn = document.getElementById('submitBtn');
        if (submitBtn) submitBtn.onclick = () => { saveCurrentAnswer(); showResults(); };
        const backBtn = document.getElementById('backBtn');
        if (backBtn) backBtn.onclick = () => { saveCurrentAnswer(); currentIndex--; loadQuestion(); };
        if (userAnswers[currentIndex] !== undefined) {
            const radio = document.querySelector(`input[name="q${currentIndex}"][value="${userAnswers[currentIndex]}"]`);
            if (radio) radio.checked = true;
        }
    }

    function showResults() {
        let correct = 0;
        currentQuestions.forEach((q, idx) => { if (userAnswers[idx] === q.correct) correct++; });
        const percent = (correct / currentQuestions.length) * 100;
        let message = (currentLang === 'ru') ? `Вы ответили правильно на ${correct} из ${currentQuestions.length} вопросов (${percent}%).` : `You answered ${correct} out of ${currentQuestions.length} questions correctly (${percent}%).`;
        if (percent === 100) message += (currentLang === 'ru') ? " Превосходно!" : " Excellent!";
        else if (percent >= 70) message += (currentLang === 'ru') ? " Хороший результат!" : " Good result!";
        else message += (currentLang === 'ru') ? " Попробуйте ещё раз." : " Try again.";
        const container = currentLang === 'ru' ? document.getElementById('trainAreaRu') : document.getElementById('trainAreaEn');
        container.innerHTML = `<div class="result-area">${message}<br><br><button class="next-btn" id="restartBtn">${currentLang === 'ru' ? 'Пройти заново' : 'Restart'}</button></div>`;
        document.getElementById('restartBtn')?.addEventListener('click', () => { resetTrain(); });
    }

    function resetTrain() {
        userAnswers = [];
        currentIndex = 0;
        loadQuestion();
    }

    function setLanguage(lang) {
        currentLang = lang;
        currentQuestions = (lang === 'ru') ? questionsRu : questionsEn;
        userAnswers = new Array(currentQuestions.length);
        currentIndex = 0;
        document.getElementById('ru-train').classList.toggle('active', lang === 'ru');
        document.getElementById('en-train').classList.toggle('active', lang === 'en');
        document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.dataset.lang === lang));
        loadQuestion();
        // обновляем текст кнопки "На главную" (уже через атрибут href, но для единообразия можно)
        const homeLinks = document.querySelectorAll('.home-btn');
        if (homeLinks.length) {
            homeLinks[0].innerText = (lang === 'ru') ? '🏠 На главную' : '🏠 Home';
            if (homeLinks[1]) homeLinks[1].innerText = (lang === 'ru') ? '🏠 На главную' : '🏠 Home';
        }
    }

    document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.addEventListener('click', () => setLanguage(btn.dataset.lang));
    });

    let deferredPrompt;
    window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; });
    document.getElementById('pwa-install-icon')?.addEventListener('click', async () => {
        if (deferredPrompt) { deferredPrompt.prompt(); await deferredPrompt.userChoice; deferredPrompt = null; }
        else alert('Для установки: Chrome/Edge — значок ⬇️ в адресной строке');
    });
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('/Game-Theory/sw.js', { scope: '/Game-Theory/' }).catch(err => console.warn(err));
        });
    }

    setLanguage('ru');
</script>
</body>
</html>
